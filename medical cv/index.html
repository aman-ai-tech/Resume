<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    padding:20px;
}

.container{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.form-section{
    flex:1;
    min-width:350px;
    background:white;
    padding:20px;
    border-radius:10px;
}

.form-section h2{
    margin-bottom:15px;
}

.form-group{
    margin-bottom:12px;
}

.form-group label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

.form-group input,
.form-group textarea{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

textarea{
    resize:vertical;
}

button{
    padding:12px 20px;
    border:none;
    cursor:pointer;
    background:#8b2f2f;
    color:white;
    border-radius:5px;
    margin:5px;
}

.resume{
    width:794px;
    min-height:1123px;
    background:white;
    display:flex;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

.sidebar{
    width:30%;
    background:#8b2f2f;
    color:white;
    padding:15px;
}

.sidebar img{
    width:100%;
    border-radius:10px;
    margin-bottom:15px;
}

.sidebar h3{
    background:white;
    color:#8b2f2f;
    padding:8px;
    margin:15px 0 10px;
}

.sidebar ul{
    list-style:none;
}

.sidebar li{
    margin-bottom:5px;
}

.main{
    width:70%;
    padding:25px;
}

.main h1{
    font-size:36px;
}

.main h2{
    color:#666;
    margin-bottom:20px;
}

.section{
    margin-bottom:15px;
}

.section h3{
    color:#8b2f2f;
    border-left:5px solid #8b2f2f;
    padding-left:10px;
    margin-bottom:8px;
}

.section ul{
    padding-left:20px;
}

.section li{
    margin-bottom:5px;
}

.preview{
    overflow:auto;
}

@media(max-width:1200px){
    .resume{
        transform:scale(.75);
        transform-origin:top left;
    }
}

</style>
</head>
<body>

<div class="container">

<div class="form-section">

<h2>Resume Builder</h2>

<div class="form-group">
<label>Photo</label>
<input type="file" id="photo">
</div>

<div class="form-group">
<label>Full Name</label>
<input type="text" id="name">
</div>

<div class="form-group">
<label>Profession</label>
<input type="text" id="profession" value="Health Assistant">
</div>

<div class="form-group">
<label>Phone</label>
<input type="text" id="phone">
</div>

<div class="form-group">
<label>Email</label>
<input type="text" id="email">
</div>

<div class="form-group">
<label>Address</label>
<input type="text" id="address">
</div>

<div class="form-group">
<label>About Me</label>
<textarea id="about" rows="4"></textarea>
</div>

<div class="form-group">
<label>Education</label>
<textarea id="education" rows="4"></textarea>
</div>

<div class="form-group">
<label>Expertise (one per line)</label>
<textarea id="expertise" rows="4"></textarea>
</div>

<div class="form-group">
<label>Languages (one per line)</label>
<textarea id="languages" rows="4"></textarea>
</div>

<div class="form-group">
<label>Internship / Training</label>
<textarea id="internship" rows="4"></textarea>
</div>

<div class="form-group">
<label>Clinical Experience</label>
<textarea id="clinical" rows="4"></textarea>
</div>

<div class="form-group">
<label>Laboratory Skills</label>
<textarea id="laboratory" rows="4"></textarea>
</div>

<div class="form-group">
<label>Computer Skills</label>
<textarea id="computer" rows="4"></textarea>
</div>

<button onclick="generateResume()">
Generate Resume
</button>

<button onclick="downloadPDF()">
Download PDF
</button>

<button onclick="sharePDF()">
Share PDF
</button>

</div>

<div class="preview">

<div class="resume" id="resume">

<div class="sidebar">

<img id="previewPhoto"
src="https://via.placeholder.com/250x300">

<p id="rPhone"></p>
<p id="rEmail"></p>
<p id="rAddress"></p>

<h3>Education</h3>
<ul id="rEducation"></ul>

<h3>Expertise</h3>
<ul id="rExpertise"></ul>

<h3>Languages</h3>
<ul id="rLanguages"></ul>

</div>

<div class="main">

<h1 id="rName">Your Name</h1>
<h2 id="rProfession">Health Assistant</h2>

<div class="section">
<h3>About Me</h3>
<p id="rAbout"></p>
</div>

<div class="section">
<h3>Internship / Training</h3>
<ul id="rInternship"></ul>
</div>

<div class="section">
<h3>Clinical Experience</h3>
<ul id="rClinical"></ul>
</div>

<div class="section">
<h3>Laboratory Skills</h3>
<ul id="rLaboratory"></ul>
</div>

<div class="section">
<h3>Computer Skills</h3>
<ul id="rComputer"></ul>
</div>

</div>
</div>

</div>

</div>

<script>

function createList(text,id){

let container=document.getElementById(id);
container.innerHTML="";

text.split('\n').forEach(item=>{
if(item.trim()){
let li=document.createElement('li');
li.textContent=item;
container.appendChild(li);
}
});

}

function generateResume(){

document.getElementById("rName").innerText=
document.getElementById("name").value;

document.getElementById("rProfession").innerText=
document.getElementById("profession").value;

document.getElementById("rPhone").innerText=
document.getElementById("phone").value;

document.getElementById("rEmail").innerText=
document.getElementById("email").value;

document.getElementById("rAddress").innerText=
document.getElementById("address").value;

document.getElementById("rAbout").innerText=
document.getElementById("about").value;

createList(
document.getElementById("education").value,
"rEducation"
);

createList(
document.getElementById("expertise").value,
"rExpertise"
);

createList(
document.getElementById("languages").value,
"rLanguages"
);

createList(
document.getElementById("internship").value,
"rInternship"
);

createList(
document.getElementById("clinical").value,
"rClinical"
);

createList(
document.getElementById("laboratory").value,
"rLaboratory"
);

createList(
document.getElementById("computer").value,
"rComputer"
);

const file=document.getElementById("photo").files[0];

if(file){

const reader=new FileReader();

reader.onload=function(e){
document.getElementById("previewPhoto").src=e.target.result;
}

reader.readAsDataURL(file);

}

}

async function downloadPDF(){

const { jsPDF } = window.jspdf;

const resume=document.getElementById("resume");

const canvas=await html2canvas(resume,{
scale:2
});

const imgData=canvas.toDataURL("image/png");

const pdf=new jsPDF('p','mm','a4');

const pdfWidth=210;

const pdfHeight=
(canvas.height*pdfWidth)/canvas.width;

pdf.addImage(
imgData,
'PNG',
0,
0,
pdfWidth,
pdfHeight
);

pdf.save("Resume.pdf");

}

async function sharePDF(){

if(!navigator.share){
alert("Sharing not supported");
return;
}

const { jsPDF } = window.jspdf;

const resume=document.getElementById("resume");

const canvas=await html2canvas(resume,{
scale:2
});

const imgData=canvas.toDataURL("image/png");

const pdf=new jsPDF('p','mm','a4');

pdf.addImage(
imgData,
'PNG',
0,
0,
210,
297
);

const blob=pdf.output('blob');

const file=new File(
[blob],
"Resume.pdf",
{
type:"application/pdf"
}
);

await navigator.share({
title:"Resume",
files:[file]
});

}

</script>

</body>
</html>
